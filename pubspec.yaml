name: worktrack_pro
description: Système de Gestion de Présence et de Pointage Intelligent
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0
  animations: ^2.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Network & API
  http: ^1.1.0
  dio: ^5.3.3
  connectivity_plus: ^5.0.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # QR Code & Camera
  mobile_scanner: ^3.5.2
  qr_flutter: ^4.1.0
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Charts
  fl_chart: ^0.65.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Utils
  intl: ^0.18.1
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  pdf: ^3.10.4
  excel: ^2.1.0
  path_provider: ^2.1.1
  
  # UI Extras
  badges: ^3.1.2
  dropdown_button2: ^2.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
